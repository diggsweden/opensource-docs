name: Update reports and publish docs

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash
    working-directory: opensource-docs

jobs:
  update-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HUGO_VERSION: 0.160.1
      HUGO_CACHEDIR: ${{ github.workspace }}/.hugo_cache
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout handbook
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: opensource-docs
          fetch-depth: 0

      - name: Checkout report monitor
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/digg-scorecard-monitor
          path: digg-scorecard-monitor
          persist-credentials: false

      - name: Import public report data
        run: |
          monitor_commit="$(git -C ../digg-scorecard-monitor rev-parse HEAD)"
          bash scripts/import_openssf_scorecard_report.sh \
            --report "../digg-scorecard-monitor/reporting/openssf-scorecard-report.json" \
            --source-commit "$monitor_commit" \
            --output "data/reports/openssf_scorecard.json"
          bash scripts/import_reuse_report.sh \
            --report "../digg-scorecard-monitor/reporting/reuse-report.json" \
            --source-commit "$monitor_commit" \
            --output "data/reports/reuse.json"
          bash scripts/import_sca_renovate_report.sh \
            --report "../digg-scorecard-monitor/reporting/sca-renovate-report.json" \
            --source-commit "$monitor_commit" \
            --output "data/reports/sca_renovate.json"
          bash scripts/import_codeowners_report.sh \
            --report "../digg-scorecard-monitor/reporting/codeowners-report.json" \
            --source-commit "$monitor_commit" \
            --output "data/reports/codeowners.json"

      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: opensource-docs/go.mod

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Cache Hugo resources
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugo-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-hugo-

      - name: Hugo modules
        run: hugo mod get

      - name: Build site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "${HUGO_CACHEDIR}"

      - name: Commit updated report data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/openssf_scorecard.json data/reports/reuse.json data/reports/sca_renovate.json data/reports/codeowners.json
          if git diff --cached --quiet; then
            echo "No report data changes to commit."
          else
            git commit -m "chore: update repository report data"
            git push
          fi

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: opensource-docs/public

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
