name: Import OpenSSF Scorecard report

on:
  schedule:
    # Runs after digg-scorecard-monitor updates on Sundays and Wednesdays at 00:00 UTC.
    - cron: "15 1 * * 0,3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout handbook
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: opensource-docs

      - name: Checkout Scorecard monitor
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/digg-scorecard-monitor
          path: digg-scorecard-monitor
          persist-credentials: false

      - name: Import public Scorecard report data
        working-directory: opensource-docs
        run: |
          bash scripts/import_openssf_scorecard_report.sh \
            --report "../digg-scorecard-monitor/reporting/openssf-scorecard-report.md" \
            --scope "../digg-scorecard-monitor/reporting/scope.json" \
            --output "data/reports/openssf_scorecard.json"

      - name: Commit updated report data
        working-directory: opensource-docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reports/openssf_scorecard.json
          git diff --cached --quiet || git commit -m "chore: update OpenSSF Scorecard report data"
          git push
