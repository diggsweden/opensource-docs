name: Accessibility (WCAG 2.1 AA)

# Manual-only: run from the Actions tab via "Run workflow".
# Audits a deployed URL — no Hugo build in CI. For local audits use `just a11y`.
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL of the site to audit (must end with /)'
        required: true
        default: 'https://diggsweden.github.io/opensource-docs/'

permissions:
  contents: read

jobs:
  pa11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run pa11y-ci against ${{ inputs.url }}
        env:
          BASE_URL: ${{ inputs.url }}
        run: npx --yes pa11y-ci@4 --config .pa11yci.cjs
